apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vm-scheduler.fullname" . }}-beat
  labels:
    {{- include "vm-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: beat
spec:
  # Always exactly 1 replica. redbeat's distributed lock prevents
  # duplicate firing if this constraint is accidentally violated,
  # but a single replica is the correct and safe default.
  replicas: 1
  selector:
    matchLabels:
      {{- include "vm-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: beat
  template:
    metadata:
      labels:
        {{- include "vm-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: beat
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "vm-scheduler.serviceAccountName" . }}
      {{- include "vm-scheduler.securityContext" . | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              until python3 -c "import urllib.request; urllib.request.urlopen('http://{{ include "vm-scheduler.fullname" . }}-api:8000/healthz', timeout=5)"; do
                echo 'Waiting for API...'; sleep 5;
              done
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - workers.celery_app
            - beat
            - --scheduler
            - redbeat.RedBeatScheduler
            - --loglevel=info
          env:
            {{- include "vm-scheduler.commonEnv" . | nindent 12 }}
          livenessProbe:
            # Beat doesn't expose an HTTP port — probe via the redbeat
            # lock key in Redis. If Beat has stopped scheduling, the
            # lock key will expire and this exec check will fail,
            # causing the pod to restart.
            exec:
              command:
                - python3
                - -c
                - |
                  import redis, os, sys
                  url = os.environ.get('CELERY_BROKER_URL', 'redis://localhost:6379/0')
                  r = redis.from_url(url)
                  sys.exit(0 if r.exists('redbeat::lock') else 1)
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 2
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
