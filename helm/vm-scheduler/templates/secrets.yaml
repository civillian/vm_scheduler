---
# Database URL secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vm-scheduler.fullname" . }}-db
  labels:
    {{- include "vm-scheduler.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "vm-scheduler.databaseUrl" . | quote }}
---
# Redis URL secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vm-scheduler.fullname" . }}-redis
  labels:
    {{- include "vm-scheduler.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "vm-scheduler.redisUrl" . | quote }}
---
# Vault credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vm-scheduler.fullname" . }}-vault
  labels:
    {{- include "vm-scheduler.labels" . | nindent 4 }}
type: Opaque
stringData:
  addr:           {{ .Values.vault.addr | quote }}
  token:          {{ .Values.vault.token | quote }}
  namespace:      {{ .Values.vault.namespace | quote }}
  awsCredPath:    {{ .Values.vault.awsCredPath | quote }}
  vcenterCredPath: {{ .Values.vault.vcenterCredPath | quote }}
