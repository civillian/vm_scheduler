{{- if .Values.flower.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vm-scheduler.fullname" . }}-flower
  labels:
    {{- include "vm-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vm-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: flower
  template:
    metadata:
      labels:
        {{- include "vm-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: flower
    spec:
      serviceAccountName: {{ include "vm-scheduler.serviceAccountName" . }}
      {{- include "vm-scheduler.securityContext" . | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: flower
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - workers.celery_app
            - flower
            - --port=5555
          ports:
            - name: http
              containerPort: 5555
              protocol: TCP
          env:
            {{- include "vm-scheduler.commonEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.flower.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vm-scheduler.fullname" . }}-flower
  labels:
    {{- include "vm-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  type: ClusterIP
  ports:
    - port: 5555
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vm-scheduler.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: flower
{{- end }}
