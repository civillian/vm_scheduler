# =============================================================================
# vm-scheduler Helm values — canonical baseline
#
# This file contains defaults and common configuration shared across all
# environments. Environment-specific files only override what genuinely differs.
#
# Usage:
#   helm install vm-scheduler ./helm/vm-scheduler \
#     -f helm/values-aks.yaml \
#     --set vault.token=xxx \
#     --set externalRedis.password=xxx
# =============================================================================

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: your-registry.example.com/vm-scheduler
  tag:         "0.1.0"
  pullPolicy:  IfNotPresent

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Component sizing — common defaults
# ---------------------------------------------------------------------------
api:
  replicaCount: 1
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits:   {cpu: 500m, memory: 512Mi}
  probes:
    liveness:  {initialDelaySeconds: 15, periodSeconds: 30}
    readiness: {initialDelaySeconds: 10, periodSeconds: 10}

worker:
  replicaCount: 2
  concurrency:  4
  resources:
    requests: {cpu: 200m, memory: 256Mi}
    limits:   {cpu: 1000m, memory: 512Mi}

beat:
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits:   {cpu: 200m, memory: 256Mi}

flower:
  enabled: true
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits:   {cpu: 200m, memory: 256Mi}

# ---------------------------------------------------------------------------
# Vault — common paths shared across all environments.
# addr, token, namespace are environment-specific and set in override files
# or via --set at install time (token should always be --set, never in a file).
# ---------------------------------------------------------------------------
vault:
  addr:           ""   # set in environment override or --set
  token:          ""   # always --set, never commit to a file
  namespace:      ""   # Vault Enterprise namespace
  awsCredPath:    "aws_central_auth/common"
  vcenterCredPath: "vsphere_auth/common"
  azureMount:     "azure"   # Vault Azure secrets engine mount point

# ---------------------------------------------------------------------------
# PostgreSQL — bundled subchart or external
# ---------------------------------------------------------------------------
postgresql:
  enabled: true   # set false to use externalDatabase instead
  auth:
    username: scheduler
    password: scheduler
    database: scheduler
  primary:
    persistence:
      size: 5Gi

externalDatabase:
  host:     ""
  port:     5432
  username: scheduler
  password: ""   # --set at install time
  database: scheduler

# ---------------------------------------------------------------------------
# Redis — bundled subchart or external
# Component parts rather than a full URL so that db numbers and password
# can be configured independently when sharing a Redis instance.
# ---------------------------------------------------------------------------
redis:
  enabled: true   # set false to use externalRedis instead
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi

externalRedis:
  host:     ""
  port:     6379
  password: ""   # --set at install time; stored in a K8s Secret
  brokerDb: 2    # use db 2 when sharing Redis (db 0 and 1 in use by TFE)
  resultDb: 3    # use db 3 when sharing Redis

# ---------------------------------------------------------------------------
# Proxy — common corporate proxy config.
# Set in environment override files; CA bundle paths depend on the base image.
# ---------------------------------------------------------------------------
proxy:
  httpProxy:       ""
  httpsProxy:      ""
  noProxy:         ""
  requestsCaBundle: ""
  awsCaBundle:     ""

# ---------------------------------------------------------------------------
# Ingress (AKS) — disabled by default, enabled in AKS override
# ---------------------------------------------------------------------------
ingress:
  enabled:    false
  className:  nginx-internal
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_method ~ ^(POST|PUT|DELETE)$) {
        return 403;
      }
  hosts: []
  tls:   []

# ---------------------------------------------------------------------------
# OpenShift Routes — disabled by default, enabled in OpenShift override
# ---------------------------------------------------------------------------
route:
  enabled: false
  api:
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  flower:
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# ---------------------------------------------------------------------------
# Security context
# [OpenShift] openshift.enabled: true drops securityContext entirely,
# allowing the restricted SCC to assign a random UID.
# ---------------------------------------------------------------------------
openshift:
  enabled: false

securityContext:
  runAsNonRoot: true
  runAsUser:    1000
  runAsGroup:   1000
  fsGroup:      1000

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name:   ""
  annotations: {}

# ---------------------------------------------------------------------------
# Pod configuration
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels:      {}
nodeSelector:   {}
tolerations:    []
affinity:       {}
