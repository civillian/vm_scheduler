apiVersion: v2
name: vm-scheduler
description: >
  VM power scheduling system. Manages scheduled power on/off operations
  for AWS EC2, Azure, and VMware vCenter workloads via a FastAPI scheduling
  API, Celery workers, Celery Beat (redbeat), and PostgreSQL/Redis backends.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - vm
  - scheduler
  - power-management
  - celery
maintainers:
  - name: Platform Engineering
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
