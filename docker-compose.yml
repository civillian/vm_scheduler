name: vm-scheduler

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       scheduler
      POSTGRES_USER:     scheduler
      POSTGRES_PASSWORD: scheduler
    # No host port binding — internal to compose network only.
    # Access via: docker compose exec postgres psql -U scheduler scheduler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Schema created by SQLAlchemy init_db() on API startup.
    # migrations/001_init.sql kept as DR reference only.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port binding — internal to compose network only.
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=scheduler
      - DB_PASSWORD=scheduler
      - DB_NAME=scheduler
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_BROKER_DB=0
      - REDIS_RESULT_DB=1
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_NAMESPACE=${VAULT_NAMESPACE}
      - VAULT_AWS_CRED_PATH=${VAULT_AWS_CRED_PATH}
      - VAULT_VCENTER_CRED_PATH=${VAULT_VCENTER_CRED_PATH}
      - VAULT_AZURE_MOUNT=${VAULT_AZURE_MOUNT:-azure}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -E
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=scheduler
      - DB_PASSWORD=scheduler
      - DB_NAME=scheduler
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_BROKER_DB=0
      - REDIS_RESULT_DB=1
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_NAMESPACE=${VAULT_NAMESPACE}
      - VAULT_AWS_CRED_PATH=${VAULT_AWS_CRED_PATH}
      - VAULT_VCENTER_CRED_PATH=${VAULT_VCENTER_CRED_PATH}
      - VAULT_AZURE_MOUNT=${VAULT_AZURE_MOUNT:-azure}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  beat:
    build: .
    command: celery -A workers.celery_app beat --scheduler redbeat.RedBeatScheduler --loglevel=info
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=scheduler
      - DB_PASSWORD=scheduler
      - DB_NAME=scheduler
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_BROKER_DB=0
      - REDIS_RESULT_DB=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 1

  flower:
    build: .
    command: celery -A workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=scheduler
      - DB_PASSWORD=scheduler
      - DB_NAME=scheduler
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_BROKER_DB=0
      - REDIS_RESULT_DB=1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
